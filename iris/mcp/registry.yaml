# IRIS MCP server registry — capabilities are SERVERS, not hardcoded code.
#
# GOLDEN RULE #1 (MCP-first): adding a capability = a line here, not core code.
# Each server declares a transport (stdio | sse), how to reach it, and an
# `enabled` flag. Disabled servers are placeholders filled in later phases.
#
# This Step 0.1 file is the declaration scaffold. The MCP host that reads it and
# connects is built in PHASE 1 (STEP 1.1). Real servers are enabled per phase.

servers:
  # ── PHASE 1: safe servers first ──────────────────────────────────────────
  filesystem:
    enabled: true             # enabled in STEP 1.1
    transport: stdio
    command: "npx -y @modelcontextprotocol/server-filesystem ./workspace"
    description: "Sandboxed file read/write, restricted to ./workspace."

  websearch:
    enabled: true             # enabled in STEP 1.1
    transport: stdio
    # mcp-server-fetch is the maintained Python fetch server (URL fetch +
    # HTML->markdown). Run as a module; `pip install mcp-server-fetch` (a dep).
    # (Canonically `uvx mcp-server-fetch` if you use uv.)
    command: "python -m mcp_server_fetch --ignore-robots-txt"
    description: "Web fetch (URL -> markdown) for research/search tasks."

  # ── PHASE 2: browser mesh (picked per task by mcp/browser_router.py) ──────
  # browser_use + browser_mcp are SSE servers you start separately (see README);
  # if not running they are simply marked down (the host isolates failures).
  browser_use:
    enabled: true
    transport: sse
    url: "http://localhost:7801/sse"
    description: "browser-use MCP — AI-driven browsing for unknown pages."

  playwright:
    enabled: true
    transport: stdio
    command: "npx -y @playwright/mcp@latest"
    description: "Playwright MCP — deterministic, accessibility-tree driven."

  browser_mcp:
    enabled: true
    transport: sse
    url: "http://localhost:7802/sse"
    description: "BrowserMCP — real logged-in Chrome session via extension."

  # ── PHASE 3: memory ───────────────────────────────────────────────────────
  # Thin MCP server exposing chromadb (the maintained vector DB) as memory tools.
  # (The PyPI `agentmemory` pkg is incompatible with current chromadb; we use the
  # same capability via chroma directly — see iris/mcp/servers/agentmemory_server.py)
  agentmemory:
    enabled: true
    transport: stdio
    command: "python -m iris.mcp.servers.agentmemory_server"
    description: "Persistent semantic memory store (chromadb-backed)."

  # ── PHASE 4: communication + calendar ─────────────────────────────────────
  gmail:
    enabled: false
    transport: stdio
    command: ""               # maintained Google Workspace MCP; OAuth in README
    description: "Gmail read/search/send via official API."

  calendar:
    enabled: false
    transport: stdio
    command: ""               # maintained Google Workspace MCP
    description: "Calendar read/create/update via official API."

  # ── PHASE 7: desktop control ──────────────────────────────────────────────
  desktop:
    enabled: false
    transport: stdio
    command: ""               # Windows-MCP (or OS equivalent)
    description: "OS-level app control: open_app, click, type, screenshot."
