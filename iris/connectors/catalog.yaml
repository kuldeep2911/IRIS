    validate_url: "https://api.github.com/user"
    account_field: "login"
  mcp:   # @modelcontextprotocol/server-github
    transport: "stdio"
    command: "npx -y @modelcontextprotocol/server-github"
    token_injection: "env"
    token_env_var: "GITHUB_PERSONAL_ACCESS_TOKEN"
  confirm_tools: ["merge_pull_request", "delete_repository", "create_or_update_file"]

