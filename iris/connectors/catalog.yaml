# Connector catalog — DATA, not code. Each entry points at a MAINTAINED MCP
# server + an auth spec. Adding a connector = adding an entry (no code change).
# The 3 Google connectors reuse ONE Google OAuth app (GOOGLE_CLIENT_ID/SECRET),
# differing only by scope, with access_type=offline + prompt=consent so a
# refresh_token is issued. MCP package names are noted per entry; verify the
# exact package/version for your environment.

# ─────────────────────────── COMMUNICATION ────────────────────────────────
gmail:
  name: "Gmail"
  category: "communication"
  icon: "tabler:brand-gmail"
  auth:
    type: "oauth2"
    authorize_url: "https://accounts.google.com/o/oauth2/v2/auth"
    token_url: "https://oauth2.googleapis.com/token"
    scopes:
      - "https://www.googleapis.com/auth/gmail.modify"
      - "https://www.googleapis.com/auth/userinfo.email"
    pkce: true
    extra_authorize_params: { access_type: "offline", prompt: "consent" }
    client_id_env: "GOOGLE_CLIENT_ID"
    client_secret_env: "GOOGLE_CLIENT_SECRET"
    userinfo_url: "https://www.googleapis.com/oauth2/v2/userinfo"
    account_field: "email"
  mcp:   # @gongrzhe/server-gmail-autoauth-mcp
    transport: "stdio"
    command: "npx -y @gongrzhe/server-gmail-autoauth-mcp"
    token_injection: "env"
    token_env_var: "GMAIL_OAUTH_TOKEN"
  confirm_tools: ["send_email"]

gcalendar:
  name: "Google Calendar"
  category: "productivity"
  icon: "tabler:calendar"
  auth:
    type: "oauth2"
    authorize_url: "https://accounts.google.com/o/oauth2/v2/auth"
    token_url: "https://oauth2.googleapis.com/token"
    scopes:
      - "https://www.googleapis.com/auth/calendar.events"
      - "https://www.googleapis.com/auth/userinfo.email"
    pkce: true
    extra_authorize_params: { access_type: "offline", prompt: "consent" }
    client_id_env: "GOOGLE_CLIENT_ID"
    client_secret_env: "GOOGLE_CLIENT_SECRET"
    userinfo_url: "https://www.googleapis.com/oauth2/v2/userinfo"
    account_field: "email"
  mcp:   # @cocal/google-calendar-mcp
    transport: "stdio"
    command: "npx -y @cocal/google-calendar-mcp"
    token_injection: "env"
    token_env_var: "GCAL_OAUTH_TOKEN"
  confirm_tools: ["delete_event"]

slack:
  name: "Slack"
  category: "communication"
  icon: "tabler:brand-slack"
  auth:
    type: "oauth2"
    authorize_url: "https://slack.com/oauth/v2/authorize"
    token_url: "https://slack.com/api/oauth.v2.access"
    scopes: ["channels:read", "chat:write", "users:read"]
    scope_separator: ","
    pkce: false
    client_id_env: "SLACK_CLIENT_ID"
    client_secret_env: "SLACK_CLIENT_SECRET"
  mcp:   # @modelcontextprotocol/server-slack
    transport: "stdio"
    command: "npx -y @modelcontextprotocol/server-slack"
    token_injection: "env"
    token_env_var: "SLACK_BOT_TOKEN"
  confirm_tools: ["post_message", "slack_post_message"]

discord:
  name: "Discord"
  category: "communication"
  icon: "tabler:brand-discord"
  auth:
    type: "pat"
    help_url: "https://discord.com/developers/applications"
    token_label: "Bot Token"
  mcp:   # community: mcp-discord
    transport: "stdio"
    command: "npx -y mcp-discord"
    token_injection: "env"
    token_env_var: "DISCORD_TOKEN"
  confirm_tools: ["send_message"]

